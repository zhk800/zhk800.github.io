---
layout: default
---
<article class="post-layout">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.categories %}
        {% for cat in page.categories %}
          <span class="post-tag">{{ cat }}</span>
        {% endfor %}
      {% endif %}
      <span>约 {{ content | number_of_words }} 字</span>
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
