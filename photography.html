---
layout: default
title: Journey
permalink: /journey/
---
<div class="container">
  <div class="page-header">
    <h1>Journey</h1>
    <p>用照片记录路上的风景与心情</p>
  </div>

  <div class="journey-grid">
    {% for journey in site.data.journey %}
    <article class="journey-card">
      <img class="journey-cover" src="{{ journey.src }}" alt="{{ journey.title }}" loading="lazy">
      <div class="journey-info">
        <div class="journey-title">{{ journey.title }}</div>
        <div class="journey-location">{{ journey.location }}</div>
      </div>
    </article>
    {% endfor %}
  </div>
</div>
